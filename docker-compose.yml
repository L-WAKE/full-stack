version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ai-kb-postgres
    environment:
      POSTGRES_DB: ai_kb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai-kb-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: ai-kb-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
