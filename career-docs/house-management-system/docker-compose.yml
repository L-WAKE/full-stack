version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: house-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: house_management
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: house-redis
    ports:
      - "6379:6379"

  house-service:
    image: eclipse-temurin:17-jre
    container_name: house-service
    working_dir: /app
    command: ["java", "-jar", "house-service.jar"]
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    volumes:
      - ../../backend/house-service/target:/app

  house-admin:
    image: nginx:1.27
    container_name: house-admin
    ports:
      - "80:80"
    depends_on:
      - house-service
    volumes:
      - ../../frontend/house-admin/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  mysql-data:
