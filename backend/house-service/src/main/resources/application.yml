server:
  port: 8080

spring:
  application:
    name: house-service
  datasource:
    driver-class-name: ${HOUSE_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${HOUSE_DB_URL:jdbc:mysql://127.0.0.1:3306/house_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${HOUSE_DB_USERNAME:house_admin}
    password: ${HOUSE_DB_PASSWORD:House@123456}
  data:
    redis:
      host: ${HOUSE_REDIS_HOST:localhost}
      port: ${HOUSE_REDIS_PORT:6379}
      database: ${HOUSE_REDIS_DATABASE:0}
      timeout: 3s
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

house:
  auth:
    token-ttl-minutes: 120
    session-store: ${HOUSE_AUTH_SESSION_STORE:memory}
